<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iskandar Rahmonov | Mobile Developer</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter',sans-serif;
}

html{
    scroll-behavior:smooth;
}

body{
    background:#050816;
    color:white;
    overflow-x:hidden;
}

/* ===== BACKGROUND ===== */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
        radial-gradient(circle at 20% 20%, rgba(59,130,246,0.12), transparent 30%),
        radial-gradient(circle at 80% 30%, rgba(139,92,246,0.12), transparent 30%),
        radial-gradient(circle at 50% 80%, rgba(6,182,212,0.08), transparent 35%);
    animation:bgMove 15s ease-in-out infinite alternate;
    z-index:-2;
}

@keyframes bgMove{
    from{transform:scale(1);}
    to{transform:scale(1.1) translateY(-30px);}
}

.floating-blur{
    position:fixed;
    width:300px;
    height:300px;
    border-radius:50%;
    filter:blur(90px);
    opacity:.15;
    z-index:-1;
    animation:float 12s infinite alternate ease-in-out;
}

.blur1{ background:#3b82f6; top:10%; left:10%; }
.blur2{ background:#8b5cf6; bottom:10%; right:10%; animation-delay:3s; }

@keyframes float{
    from{transform:translate(0,0);}
    to{transform:translate(40px,-30px);}
}

/* ===== LAYOUT ===== */
.container{
    width:min(1200px,90%);
    margin:auto;
}

header{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:50px;
}

.left{ flex:1; }

.badge{
    display:inline-block;
    padding:10px 18px;
    border-radius:30px;
    background:rgba(255,255,255,0.05);
    color:#94a3b8;
    margin-bottom:25px;
}

h1{
    font-size:72px;
    line-height:1.1;
    font-weight:800;
    margin-bottom:20px;
}

.gradient{
    background:linear-gradient(90deg,#60a5fa,#a78bfa,#22d3ee);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.subtitle{
    font-size:20px;
    color:#94a3b8;
    line-height:1.7;
}

.buttons{
    display:flex;
    gap:20px;
    margin-top:35px;
}

.btn{
    padding:16px 28px;
    border-radius:16px;
    text-decoration:none;
    font-weight:600;
    transition:.3s;
}

.primary{
    background:linear-gradient(135deg,#2563eb,#7c3aed);
    color:white;
}

.secondary{
    border:1px solid rgba(255,255,255,0.12);
    color:white;
}

.btn:hover{
    transform:translateY(-5px);
}

.right{
    flex:1;
    display:flex;
    justify-content:center;
}

/* ===== HERO CARD ===== */
.hero-card{
    width:380px;
    height:480px;
    border-radius:30px;
    overflow:hidden;
    position:relative;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(30px);
    transition:transform .2s;
}

.hero-card img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.hero-card::after{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(to top, rgba(5,8,22,.8), transparent);
}

.info{
    position:absolute;
    bottom:30px;
    left:30px;
}

.info h3{ font-size:26px; }
.info p{ color:#cbd5e1; }

/* ===== SECTIONS ===== */
section{ padding:100px 0; }

.section-title{
    font-size:42px;
    margin-bottom:50px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:25px;
}

.card{
    padding:25px;
    border-radius:20px;
    background:rgba(255,255,255,0.05);
}

.card img{
    width:60px;
    margin-bottom:20px;
}

.card h3{ margin-bottom:10px; }

.card p{
    color:#94a3b8;
    line-height:1.6;
}

.skills{
    display:flex;
    flex-wrap:wrap;
    gap:12px;
}

.skill{
    padding:10px 16px;
    border-radius:12px;
    background:rgba(255,255,255,0.05);
}

/* ===== FOOTER ===== */
footer{
    text-align:center;
    padding:50px 0;
    color:#64748b;
}

/* ===== ANIMATION ===== */
.reveal{
    opacity:0;
    transform:translateY(40px);
    transition:1s;
}
.reveal.active{
    opacity:1;
    transform:translateY(0);
}

/* ===== ADAPTIVE ===== */
@media (max-width:1024px){
    header{
        flex-direction:column;
        text-align:center;
    }
    .buttons{
        justify-content:center;
    }
    h1{ font-size:48px; }
}

@media (max-width:768px){
    h1{ font-size:34px; }
    .subtitle{ font-size:16px; }

    .buttons{
        flex-direction:column;
        width:100%;
    }
    .btn{
        width:100%;
        text-align:center;
    }

    .hero-card{
        width:100%;
        max-width:300px;
        height:360px;
    }

    .grid{
        grid-template-columns:1fr;
    }

    .section-title{
        font-size:28px;
        text-align:center;
    }
}

@media (max-width:480px){
    h1{ font-size:26px; }
    .hero-card{ height:300px; }
}
</style>
</head>

<body>

<div class="floating-blur blur1"></div>
<div class="floating-blur blur2"></div>

<div class="container">

<header>
    <div class="left reveal">
        <div class="badge">Mobile & Fullstack Developer</div>

        <h1>
            Создаю <span class="gradient">цифровой опыт</span>
        </h1>

        <p class="subtitle">
            Разрабатываю мобильные приложения и backend системы
        </p>

        <div class="buttons">
            <a class="btn primary" href="https://github.com" target="_blank">GitHub</a>
            <a class="btn secondary" href="https://t.me" target="_blank">Telegram</a>
        </div>
    </div>

    <div class="right reveal">
        <div class="hero-card" id="heroCard">
            <img src="photo.jpg">
            <div class="info">
                <h3>Искандар</h3>
                <p>Mobile Developer</p>
            </div>
        </div>
    </div>
</header>

<section>
    <h2 class="section-title reveal">Что я делаю</h2>

    <div class="grid">
        <div class="card reveal">
            <h3>Mobile Apps</h3>
            <p>iOS и Android приложения</p>
        </div>

        <div class="card reveal">
            <h3>Backend</h3>
            <p>API и серверная логика</p>
        </div>

        <div class="card reveal">
            <h3>UI/UX</h3>
            <p>Современный интерфейс</p>
        </div>
    </div>
</section>

<footer>
    © 2026 Iskandar Rahmonov
</footer>

</div>

<script>
const reveals=document.querySelectorAll('.reveal');

window.addEventListener('scroll',()=>{
    reveals.forEach(el=>{
        if(el.getBoundingClientRect().top < window.innerHeight-100){
            el.classList.add('active');
        }
    });
});

/* отключаем 3D на мобиле */
if(window.innerWidth > 768){
    const card=document.getElementById('heroCard');
    document.addEventListener('mousemove',(e)=>{
        const x=(window.innerWidth/2-e.clientX)/30;
        const y=(window.innerHeight/2-e.clientY)/30;
        card.style.transform=`rotateY(${-x}deg) rotateX(${y}deg)`;
    });
}
</script>

</body>
</html>
